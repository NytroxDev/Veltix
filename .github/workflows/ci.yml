name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # ── Lint & format ──────────────────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format . --check

  # ── Type checking ──────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install mypy
        run: pip install mypy

      - name: mypy
        run: mypy src/veltix/

  # ── Version check ──────────────────────────────────────────────────────────
  version-check:
    name: Version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate version in pyproject.toml
        run: |
          VERSION=$(python -c "import re; content = open('pyproject.toml').read(); print(re.search(r'^version\s*=\s*[\"\'](.*?)[\"\']', content, re.MULTILINE).group(1))")

          echo "version: $VERSION"

          if [ -z "$VERSION" ]; then
            echo "❌ Version is empty in pyproject.toml!"
            exit 1
          fi

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "❌ Version '$VERSION' does not look like semver!"
            exit 1
          fi

          echo "✅ Version valid: $VERSION"

  # ── Build check ────────────────────────────────────────────────────────────
  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          python -c "import veltix; print(f'veltix {veltix.__version__} imported successfully')"
          pip uninstall veltix -y

  # ── Tests ──────────────────────────────────────────────────────────────────
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: version-check
    strategy:
      matrix:
        python-version: [ "3.8", "3.10", "3.12", "3.14" ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest tests/ --tb=short
