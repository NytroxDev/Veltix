name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # ── Checks (lint, format, mypy, version, compat, tests) ───────────────────
  checks:
    name: Checks (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff mypy pytest pytest-xdist

      - name: Run fix.sh
        run: bash fix.sh

  # ── Tests matrix (other Python versions) ──────────────────────────────────
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.8", "3.10", "3.14" ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-xdist

      - name: Run tests
        run: python -m pytest tests/ --tb=short
