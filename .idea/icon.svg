<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1526"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>

    <clipPath id="circle">
      <circle cx="200" cy="200" r="185"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#0a0e1a" stroke="#1e3a5f" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="185" fill="url(#bgGrad)"/>

  <!-- Grid lines subtle -->
  <g clip-path="url(#circle)" opacity="0.07">
    <line x1="0" y1="100" x2="400" y2="100" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#38bdf8" stroke-width="0.5"/>
  </g>

  <!-- Connection nodes -->
  <g opacity="0.25">
    <circle cx="90" cy="130" r="3" fill="#38bdf8"/>
    <circle cx="310" cy="130" r="3" fill="#38bdf8"/>
    <circle cx="90" cy="270" r="3" fill="#38bdf8"/>
    <circle cx="310" cy="270" r="3" fill="#38bdf8"/>
    <line x1="90" y1="130" x2="310" y2="130" stroke="#38bdf8" stroke-width="0.5" stroke-dasharray="4 4"/>
    <line x1="90" y1="270" x2="310" y2="270" stroke="#38bdf8" stroke-width="0.5" stroke-dasharray="4 4"/>
    <line x1="90" y1="130" x2="90" y2="270" stroke="#38bdf8" stroke-width="0.5" stroke-dasharray="4 4"/>
    <line x1="310" y1="130" x2="310" y2="270" stroke="#38bdf8" stroke-width="0.5" stroke-dasharray="4 4"/>
  </g>

  <!-- V glow — couches suivant la forme, opacité décroissante -->
  <polyline points="118,128 200,272 282,128" fill="none" stroke="#38bdf8" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" opacity="0.04"/>
  <polyline points="118,128 200,272 282,128" fill="none" stroke="#38bdf8" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" opacity="0.07"/>
  <polyline points="118,128 200,272 282,128" fill="none" stroke="#38bdf8" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.10"/>
  <polyline points="118,128 200,272 282,128" fill="none" stroke="#38bdf8" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>

  <!-- V shape — main -->
  <polyline
    points="118,128 200,272 282,128"
    fill="none"
    stroke="url(#vGrad)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- V shape — inner highlight -->
  <polyline
    points="118,128 200,272 282,128"
    fill="none"
    stroke="#e0f5ff"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.45"
  />

  <!-- Horizontal accent line under V -->
  <rect x="100" y="295" width="200" height="1.5" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- VELTIX text -->
  <text
    x="200"
    y="338"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    font-weight="700"
    letter-spacing="10"
    fill="#38bdf8"
    opacity="0.95"
  >VELTIX</text>

  <!-- Outer ring accent -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
</svg>