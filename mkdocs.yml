site_name: Veltix
site_description: A modern, lightweight TCP networking library for Python
site_url: https://nytroxdev.github.io/Veltix
repo_url: https://github.com/NytroxDev/Veltix
repo_name: NytroxDev/Veltix

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [ . ]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Guides:
      - Server: guides/server.md
      - Client: guides/client.md
      - Messages: guides/messages.md
      - Callbacks & Events: guides/callbacks.md
      - Logger: guides/logger.md
  - API Reference:
      - Server: api/server.md
      - Client: api/client.md
      - Request & Response: api/request.md
      - Sender: api/sender.md
      - MessageType: api/types.md
      - RequestHandler: api/request_handler.md
      - HandshakeHandler: api/handshake_handler.md
      - CallbackExecutor: api/callback_executor.md
      - Logger: api/logger.md
      - Exceptions: api/exceptions.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NytroxDev/Veltix
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/veltix
    - icon: fontawesome/brands/discord
      link: https://discord.gg/NrEjSHtfMp
